      <stop offset="0" stop-color="#0b0b0b" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#111" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="t"/>
